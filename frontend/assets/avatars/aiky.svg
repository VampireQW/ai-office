<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#e0e7ff" />
  
  <!-- Robot Head -->
  <rect x="25" y="30" width="50" height="40" rx="10" fill="url(#robotGrad)" />
  <!-- Antenna -->
  <line x1="50" y1="30" x2="50" y2="15" stroke="#4338ca" stroke-width="3" />
  <circle cx="50" cy="15" r="4" fill="#ef4444" class="animate-pulse" />
  <!-- Eyes -->
  <rect x="35" y="45" width="30" height="10" rx="5" fill="#1e1b4b" />
  <circle cx="42" cy="50" r="2" fill="#4ade80" />
  <circle cx="58" cy="50" r="2" fill="#4ade80" />
  <!-- Mouth -->
  <line x1="40" y1="60" x2="60" y2="60" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
</svg>
