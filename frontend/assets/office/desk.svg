<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <!-- Desk Top -->
  <rect x="10" y="10" width="180" height="80" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
  <!-- Mousepad -->
  <rect x="140" y="50" width="30" height="25" rx="2" fill="#1e293b" opacity="0.8" />
  <!-- Keyboard -->
  <rect x="60" y="55" width="70" height="20" rx="1" fill="#cbd5e1" stroke="#94a3b8" />
  <!-- Monitor Stand -->
